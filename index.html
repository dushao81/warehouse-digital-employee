<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>仓库数字员工</title>

  <style>
/* ==========================================
   仓库数字员工 H5 - 全局样式
   作者：小凡 @ 2026-03-22
   设计基准：375px 宽（对应小程序 750rpx）
   转换规则：rpx ÷ 2 = px
   ========================================== */

/* ==============================
   CSS 变量（颜色系统）
   ============================== */
:root {
  --primary-color: #4A90E2;
  --primary-light: #ECF4FF;
  --success-color: #52C41A;
  --warning-color: #FA8C16;
  --danger-color: #F5222D;
  --text-primary: #262626;
  --text-secondary: #8C8C8C;
  --text-muted: #BFBFBF;
  --bg-color: #F5F7FA;
  --card-bg: #FFFFFF;
  --border-color: #E8E8E8;
  --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);

  --safe-bottom: env(safe-area-inset-bottom);
  --font-size-xs: 11px;
  --font-size-sm: 12px;
  --font-size-base: 14px;
  --font-size-md: 15px;
  --font-size-lg: 16px;
  --font-size-xl: 17px;
}

/* ==============================
   Reset & Base
   ============================== */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 14px;
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background-color: var(--bg-color);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

#app {
  min-height: 100vh;
}

/* ==============================
   Page Layout
   ============================== */
.page {
  min-height: 100vh;
  padding-bottom: calc(70px + var(--safe-bottom));
  background: var(--bg-color);
}

.page-with-back {
  padding-top: 0;
}

/* 返回头部 */
.page-header-simple {
  background: var(--primary-color);
  color: #fff;
  display: flex;
  align-items: center;
  padding: 12px 16px calc(12px + var(--safe-bottom)) 8px;
  position: sticky;
  top: 0;
  z-index: 50;
}

.back-btn {
  font-size: 32px;
  font-weight: 300;
  padding: 4px 12px;
  color: #fff;
  cursor: pointer;
  line-height: 1;
}

.page-title-simple {
  font-size: 17px;
  font-weight: 600;
  color: #fff;
  margin-left: 4px;
}

/* ==============================
   Tab Bar
   ============================== */
.tabbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: calc(60px + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: #fff;
  display: flex;
  border-top: 1px solid var(--border-color);
  z-index: 100;
  box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
}

.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  cursor: pointer;
  color: var(--text-secondary);
  transition: color 0.2s;
  padding: 8px 0;
  -webkit-tap-highlight-color: transparent;
}

.tab-item.active {
  color: var(--primary-color);
}

.tab-icon {
  font-size: 22px;
  line-height: 1;
}

.tab-text {
  font-size: 10px;
}

/* ==============================
   Toast 提示
   ============================== */
#toast-container {
  position: fixed;
  top: 20%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.toast {
  background: rgba(0,0,0,0.75);
  color: #fff;
  font-size: 14px;
  padding: 10px 20px;
  border-radius: 20px;
  white-space: nowrap;
  animation: toastIn 0.2s ease;
  max-width: 80vw;
  text-align: center;
}

.toast.success { background: rgba(82, 196, 26, 0.9); }
.toast.error   { background: rgba(245, 34, 45, 0.9); }
.toast.warning { background: rgba(250, 140, 22, 0.9); }

@keyframes toastIn {
  from { opacity: 0; transform: translateY(-10px) scale(0.9); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes toastOut {
  from { opacity: 1; transform: translateY(0) scale(1); }
  to   { opacity: 0; transform: translateY(-10px) scale(0.9); }
}

/* ==============================
   Modal 通用遮罩
   ============================== */
.modal-mask {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 30px;
}

.modal-dialog {
  background: #fff;
  border-radius: 12px;
  width: 100%;
  max-width: 320px;
  overflow: hidden;
  animation: modalIn 0.2s ease;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.9); }
  to   { opacity: 1; transform: scale(1); }
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border-color);
}

.modal-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--text-primary);
}

.modal-close {
  font-size: 18px;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
}

.modal-footer {
  display: flex;
  gap: 8px;
  padding: 12px 16px calc(12px + var(--safe-bottom));
}

/* ==============================
   通用卡片
   ============================== */
.card {
  background: var(--card-bg);
  border-radius: 8px;
  padding: 16px;
  margin: 12px;
  box-shadow: var(--shadow);
}

.card-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.card-more {
  font-size: 12px;
  color: var(--primary-color);
  font-weight: 400;
}

/* ==============================
   统计卡片行
   ============================== */
.stats-row {
  display: flex;
  justify-content: space-between;
  padding: 12px 12px 0;
  gap: 8px;
}

.stat-card {
  flex: 1;
  background: var(--card-bg);
  border-radius: 8px;
  padding: 14px 8px;
  text-align: center;
  box-shadow: var(--shadow);
  cursor: pointer;
}

.stat-number {
  font-size: 26px;
  font-weight: 700;
  color: var(--primary-color);
  line-height: 1.2;
}

.warning-text {
  color: var(--warning-color);
}

.stat-label {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 4px;
}

/* ==============================
   快捷操作
   ============================== */
.quick-actions {
  display: flex;
  justify-content: space-around;
}

.action-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 11px;
  color: var(--text-primary);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.action-icon {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  margin-bottom: 6px;
}

.icon-in   { background: #ECF4FF; }
.icon-out  { background: #FFF7E6; }
.icon-cat  { background: #F6FFED; }
.icon-stat { background: #F9F0FF; }

/* ==============================
   搜索栏
   ============================== */
.search-bar {
  background: #fff;
  padding: 10px 12px;
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.search-input-wrap {
  display: flex;
  align-items: center;
  background: var(--bg-color);
  border-radius: 20px;
  padding: 8px 12px;
  gap: 6px;
}

.search-icon {
  font-size: 14px;
  flex-shrink: 0;
}

.search-input {
  flex: 1;
  font-size: 14px;
  color: var(--text-primary);
  background: transparent;
  border: none;
  outline: none;
  min-height: 20px;
}

.search-clear {
  font-size: 14px;
  color: var(--text-muted);
  cursor: pointer;
  padding: 0 4px;
  flex-shrink: 0;
}

/* ==============================
   分类筛选
   ============================== */
.category-scroll {
  background: #fff;
  overflow-x: auto;
  border-bottom: 1px solid #F0F0F0;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.category-scroll::-webkit-scrollbar { display: none; }

.category-tabs {
  display: inline-flex;
  padding: 0 8px;
  gap: 4px;
  white-space: nowrap;
}

.category-tab {
  display: inline-block;
  padding: 8px 14px;
  font-size: 13px;
  color: var(--text-secondary);
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}

.category-tab.active {
  color: var(--primary-color);
  border-bottom-color: var(--primary-color);
  font-weight: 600;
}

/* ==============================
   物品列表
   ============================== */
.item-list {
  padding: 8px 12px 100px;
}

.item-card {
  background: #fff;
  border-radius: 8px;
  padding: 14px 12px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}

.item-card.low-stock {
  border-left: 3px solid var(--danger-color);
}

.low-stock-badge {
  position: absolute;
  top: 0;
  right: 0;
  background: var(--danger-color);
  color: #fff;
  font-size: 10px;
  padding: 3px 8px;
  border-bottom-left-radius: 6px;
}

.item-main {
  flex: 1;
  min-width: 0;
}

.item-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 4px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.item-category-tag {
  display: inline-block;
  background: var(--primary-light);
  color: var(--primary-color);
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 10px;
}

.item-stock {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 0 12px;
  min-width: 40px;
}

.stock-number {
  font-size: 20px;
  font-weight: 700;
  color: var(--primary-color);
  line-height: 1.2;
}

.stock-danger {
  color: var(--danger-color);
}

.stock-unit {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 2px;
}

.item-arrow {
  font-size: 18px;
  color: var(--text-muted);
  flex-shrink: 0;
}

/* ==============================
   FAB 悬浮按钮
   ============================== */
.fab-btn {
  position: fixed;
  right: 20px;
  bottom: calc(70px + var(--safe-bottom));
  width: 50px;
  height: 50px;
  background: var(--primary-color);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 12px rgba(74, 144, 226, 0.5);
  z-index: 100;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.fab-icon {
  font-size: 24px;
  color: #fff;
  line-height: 1;
  margin-top: -2px;
}

/* ==============================
   物品详情
   ============================== */
.info-card {
  background: var(--card-bg);
  border-radius: 8px;
  margin: 12px;
  padding: 16px;
  box-shadow: var(--shadow);
}

.low-stock-card {
  border-top: 3px solid var(--danger-color);
}

.low-stock-tip {
  background: #FFF1F0;
  color: var(--danger-color);
  font-size: 12px;
  padding: 6px 10px;
  border-radius: 6px;
  margin-bottom: 10px;
}

.item-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.item-header .item-name {
  font-size: 18px;
  margin-bottom: 0;
}

.stock-display {
  text-align: center;
  padding: 8px 0;
}

.stock-big-number {
  font-size: 48px;
  font-weight: 800;
  color: var(--primary-color);
  line-height: 1.1;
}

.stock-big-number.danger {
  color: var(--danger-color);
}

.stock-unit-label {
  font-size: 16px;
  color: var(--text-secondary);
  margin-top: 4px;
}

.min-stock-row {
  font-size: 12px;
  color: var(--text-secondary);
  text-align: center;
  margin-top: 4px;
}

.min-stock-value {
  color: var(--text-primary);
}

/* 操作栏 */
.action-bar {
  display: flex;
  gap: 8px;
  margin: 12px;
}

.action-bar .action-btn {
  flex: 1;
  flex-direction: row;
  justify-content: center;
  background: #fff;
  border-radius: 8px;
  padding: 10px 8px;
  box-shadow: var(--shadow);
  font-size: 13px;
  gap: 4px;
}

.btn-in    { color: #1890FF; }
.btn-out   { color: var(--warning-color); }
.btn-edit  { color: var(--primary-color); }
.btn-delete{ color: var(--danger-color); }

.btn-icon {
  font-size: 16px;
}

/* 详情卡片 */
.detail-card {
  background: var(--card-bg);
  border-radius: 8px;
  margin: 12px;
  padding: 16px;
  box-shadow: var(--shadow);
}

.detail-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 12px;
}

.detail-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border-color);
  font-size: 13px;
}

.detail-row:last-child {
  border-bottom: none;
}

.detail-label {
  color: var(--text-secondary);
}

.detail-value {
  color: var(--text-primary);
  font-weight: 500;
}

/* 记录卡片 */
.record-card {
  background: var(--card-bg);
  border-radius: 8px;
  margin: 12px;
  padding: 16px;
  box-shadow: var(--shadow);
}

.record-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.record-item {
  display: flex;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border-color);
}

.record-item:last-child {
  border-bottom: none;
}

.record-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin-right: 8px;
  flex-shrink: 0;
}

.dot-in  { background: var(--success-color); }
.dot-out { background: var(--danger-color); }

.record-type-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 4px;
  margin-right: 8px;
  flex-shrink: 0;
}

.badge-in  { background: #F6FFED; color: var(--success-color); }
.badge-out { background: #FFF1F0; color: var(--danger-color); }

.record-info {
  flex: 1;
  min-width: 0;
}

.record-note {
  font-size: 13px;
  color: var(--text-primary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.record-time {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 2px;
}

.record-qty {
  font-size: 15px;
  font-weight: 600;
  flex-shrink: 0;
  margin-left: 8px;
}

.qty-in  { color: var(--success-color); }
.qty-out { color: var(--danger-color); }

.empty-records {
  text-align: center;
  padding: 20px 0;
  font-size: 13px;
  color: var(--text-muted);
}

/* ==============================
   入库/出库弹窗
   ============================== */
.action-modal .modal-stock-tip {
  padding: 8px 16px;
  font-size: 13px;
  color: var(--text-secondary);
  background: var(--bg-color);
}

.tip-number {
  color: var(--primary-color);
  font-weight: 700;
  font-size: 16px;
}

.modal-field {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-color);
}

.field-label {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 8px;
  display: block;
}

.required { color: var(--danger-color); }

.field-input-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}

.field-input {
  flex: 1;
  font-size: 15px;
  color: var(--text-primary);
  border: none;
  border-bottom: 1px solid var(--border-color);
  padding: 4px 0;
  outline: none;
  background: transparent;
}

.field-input:focus {
  border-bottom-color: var(--primary-color);
}

.field-unit {
  font-size: 14px;
  color: var(--text-secondary);
  flex-shrink: 0;
}

.field-textarea {
  width: 100%;
  font-size: 14px;
  color: var(--text-primary);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 8px;
  resize: none;
  outline: none;
  font-family: inherit;
}

.field-textarea:focus {
  border-color: var(--primary-color);
}

.modal-cancel {
  flex: 1;
  text-align: center;
  font-size: 15px;
  color: var(--text-secondary);
  padding: 12px 0;
  background: #F5F5F5;
  border-radius: 24px;
  cursor: pointer;
}

.modal-confirm {
  flex: 2;
  text-align: center;
  font-size: 15px;
  color: #fff;
  padding: 12px 0;
  border-radius: 24px;
  font-weight: 600;
  cursor: pointer;
}

.confirm-in  { background: var(--success-color); }
.confirm-out { background: var(--warning-color); }
.disabled    { background: var(--text-muted); }

/* ==============================
   表单页
   ============================== */
.form-container {
  padding: 0 0 80px;
}

.form-section {
  margin-bottom: 4px;
}

.form-section-title {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 600;
  padding: 12px 16px 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-item {
  background: #fff;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-color);
}

.form-label {
  font-size: 13px;
  color: var(--text-secondary);
  display: block;
  margin-bottom: 6px;
}

.form-label.required::before {
  content: '*';
  color: var(--danger-color);
  margin-right: 2px;
}

.form-input {
  width: 100%;
  font-size: 15px;
  color: var(--text-primary);
  border: none;
  border-bottom: 1px solid var(--border-color);
  padding: 4px 0;
  outline: none;
  background: transparent;
  font-family: inherit;
}

.form-input:focus {
  border-bottom-color: var(--primary-color);
}

.form-input::placeholder {
  color: var(--text-muted);
}

.picker-value {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 15px;
  color: var(--text-primary);
  padding: 4px 0;
  border-bottom: 1px solid var(--border-color);
  cursor: pointer;
}

.picker-value.placeholder {
  color: var(--text-muted);
}

.picker-arrow {
  font-size: 18px;
  color: var(--text-muted);
}

/* 带后缀的输入行 */
.input-with-suffix {
  display: flex;
  align-items: center;
  gap: 8px;
}

.input-flex {
  flex: 1;
}

.input-suffix-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.unit-picker {
  font-size: 13px;
  color: var(--text-secondary);
  cursor: pointer;
  padding: 4px 8px;
  background: var(--bg-color);
  border-radius: 6px;
  white-space: nowrap;
}

.unit-custom-btn {
  font-size: 12px;
  color: var(--primary-color);
  cursor: pointer;
  white-space: nowrap;
}

.unit-done-btn {
  background: var(--primary-color);
  color: #fff;
  padding: 4px 10px;
  border-radius: 6px;
}

.custom-unit-input {
  font-size: 13px;
  color: var(--text-primary);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 4px 8px;
  outline: none;
  width: 80px;
}

.custom-unit-wrap {
  gap: 4px;
}

.text-suffix {
  font-size: 13px;
  color: var(--text-secondary);
  flex-shrink: 0;
}

/* picker sheet (bottom sheet for category/supplier) */
.cat-picker-sheet {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #fff;
  border-radius: 12px 12px 0 0;
  z-index: 300;
  max-height: 60vh;
  overflow-y: auto;
  padding-bottom: var(--safe-bottom);
  box-shadow: 0 -4px 24px rgba(0,0,0,0.15);
}

.picker-sheet-header {

<script>
/**
 * ==========================================
 * 数据模型 - models.js
 * ==========================================
 * 作者：小凡 @ 2026-03-22
 * 用途：定义库存物品、分类、记录、供应商的数据结构
 * ==========================================
 */

const Models = {}

/* ============================
   Item（物品）
   ============================ */
Models.Item = {
  /**
   * 创建新物品实例
   */
  create(data) {
    const now = Date.now()
    return {
      id: 'item_' + now + '_' + Math.random().toString(36).substr(2, 6),
      name: data.name || '',
      categoryId: data.categoryId || '',
      quantity: Number(data.quantity) || 0,
      unit: data.unit || '个',
      minStock: Number(data.minStock) || 0,
      location: data.location || '',
      supplierId: data.supplierId || '',
      price: Number(data.price) || 0,
      lastUpdated: now,
      createdAt: now
    }
  },

  /** 判断是否低库存 */
  isLowStock(item) {
    return item.minStock > 0 && item.quantity <= item.minStock
  }
}

/* ============================
   Category（分类）
   ============================ */
Models.Category = {
  TYPE_IN: 'in',
  TYPE_OUT: 'out',

  /** 创建新分类 */
  create(data) {
    return {
      id: 'cat_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      name: data.name || '',
      parentId: data.parentId || '',
      order: Number(data.order) || 99,
      icon: data.icon || 'folder'
    }
  },

  isTopLevel(cat) {
    return !cat.parentId || cat.parentId === ''
  },

  getTopLevel(categories) {
    return categories.filter(c => this.isTopLevel(c))
  },

  getChildren(categories, parentId) {
    return categories.filter(c => c.parentId === parentId)
  }
}

/* ============================
   Record（出入库记录）
   ============================ */
Models.Record = {
  TYPE_IN: 'in',
  TYPE_OUT: 'out',

  /** 创建新记录 */
  create(data) {
    return {
      id: 'rec_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      itemId: data.itemId || '',
      type: data.type === Models.Category.TYPE_IN
        ? Models.Category.TYPE_IN
        : Models.Category.TYPE_OUT,
      quantity: Math.abs(Number(data.quantity)) || 0,
      date: data.date || Date.now(),
      operator: data.operator || '',
      note: data.note || ''
    }
  },

  getTypeName(type) {
    return type === Models.Category.TYPE_IN ? '入库' : '出库'
  }
}

/* ============================
   Supplier（供应商）
   ============================ */
Models.Supplier = {
  create(data) {
    return {
      id: 'sup_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      name: data.name || '',
      phone: data.phone || '',
      note: data.note || ''
    }
  }
}

window.Models = Models
</script>

<script>
/**
 * ==========================================
 * 数据层 - store.js
 * ==========================================
 * 作者：小凡 @ 2026-03-22
 * 用途：封装 localStorage，替代微信的 wx.getStorageSync / wx.setStorageSync
 * 所有键名统一加前缀 wms_
 * ==========================================
 */

const Store = {}

// ============================
// 存储 Key 常量
// ============================
const PREFIX = 'wms_'
const KEYS = {
  ITEMS:      PREFIX + 'items',
  CATEGORIES: PREFIX + 'categories',
  RECORDS:    PREFIX + 'records',
  SUPPLIERS:  PREFIX + 'suppliers',
  ALERTS:     PREFIX + 'processed_alerts'  // 已处理的预警ID集合
}

// ============================
// 默认数据
// ============================
const DEFAULT_CATEGORIES = [
  { id: 'cat_default_1', name: '办公用品', parentId: '', order: 1, icon: 'folder' },
  { id: 'cat_default_2', name: '电子设备', parentId: '', order: 2, icon: 'folder' },
  { id: 'cat_default_3', name: '工具耗材', parentId: '', order: 3, icon: 'folder' }
]

const DEFAULT_ITEMS = [
  {
    id: 'item_demo_1',
    name: 'A4打印纸',
    categoryId: 'cat_default_1',
    quantity: 50,
    unit: '箱',
    minStock: 10,
    location: 'A区-01-01',
    supplierId: '',
    price: 28,
    lastUpdated: Date.now(),
    createdAt: Date.now()
  },
  {
    id: 'item_demo_2',
    name: '鼠标',
    categoryId: 'cat_default_2',
    quantity: 3,
    unit: '个',
    minStock: 5,
    location: 'B区-02-03',
    supplierId: '',
    price: 89,
    lastUpdated: Date.now(),
    createdAt: Date.now()
  }
]

// ============================
// 内部辅助函数
// ============================
function _getArray(key) {
  try {
    const data = localStorage.getItem(key)
    return Array.isArray(JSON.parse(data)) ? JSON.parse(data) : []
  } catch {
    return []
  }
}

function _setArray(key, arr) {
  localStorage.setItem(key, JSON.stringify(arr))
}

function _findById(array, id) {
  return array.find(item => item.id === id) || null
}

function _removeById(array, id) {
  return array.filter(item => item.id !== id)
}

// ============================
// 初始化
// ============================
Store.init = function () {
  if (!localStorage.getItem(KEYS.CATEGORIES)) {
    _setArray(KEYS.CATEGORIES, DEFAULT_CATEGORIES)
  }
  if (!localStorage.getItem(KEYS.ITEMS)) {
    _setArray(KEYS.ITEMS, DEFAULT_ITEMS)
  }
  if (!localStorage.getItem(KEYS.SUPPLIERS)) {
    _setArray(KEYS.SUPPLIERS, [])
  }
  if (!localStorage.getItem(KEYS.RECORDS)) {
    _setArray(KEYS.RECORDS, [])
  }
  if (!localStorage.getItem(KEYS.ALERTS)) {
    localStorage.setItem(KEYS.ALERTS, JSON.stringify({}))
  }
}

// ============================
// 物品 CRUD
// ============================
Store.getAllItems = function () {
  return _getArray(KEYS.ITEMS)
}

Store.getItemById = function (id) {
  return _findById(Store.getAllItems(), id)
}

Store.addItem = function (data) {
  const items = Store.getAllItems()
  const newItem = Models.Item.create(data)
  items.push(newItem)
  _setArray(KEYS.ITEMS, items)
  return newItem
}

Store.updateItem = function (id, data) {
  const items = Store.getAllItems()
  const index = items.findIndex(item => item.id === id)
  if (index === -1) return null
  items[index] = {
    ...items[index],
    ...data,
    id: items[index].id,
    lastUpdated: Date.now()
  }
  _setArray(KEYS.ITEMS, items)
  return items[index]
}

Store.deleteItem = function (id) {
  const items = Store.getAllItems()
  const filtered = _removeById(items, id)
  if (filtered.length === items.length) return false
  _setArray(KEYS.ITEMS, filtered)
  return true
}

Store.getLowStockItems = function () {
  return Store.getAllItems().filter(item => Models.Item.isLowStock(item))
}

// ============================
// 分类 CRUD
// ============================
Store.getAllCategories = function () {
  return _getArray(KEYS.CATEGORIES)
}

Store.addCategory = function (data) {
  const cats = Store.getAllCategories()
  const newCat = Models.Category.create(data)
  cats.push(newCat)
  _setArray(KEYS.CATEGORIES, cats)
  return newCat
}

Store.updateCategory = function (id, data) {
  const cats = Store.getAllCategories()
  const index = cats.findIndex(c => c.id === id)
  if (index === -1) return null
  cats[index] = { ...cats[index], ...data, id: cats[index].id }
  _setArray(KEYS.CATEGORIES, cats)
  return cats[index]
}

Store.deleteCategory = function (id) {
  const cats = Store.getAllCategories()
  const filtered = _removeById(cats, id)
  if (filtered.length === cats.length) return false
  _setArray(KEYS.CATEGORIES, filtered)
  return true
}

// ============================
// 记录 CRUD
// ============================
Store.getAllRecords = function () {
  return _getArray(KEYS.RECORDS)
}

Store.addRecord = function (data) {
  const records = Store.getAllRecords()
  const newRecord = Models.Record.create(data)
  records.push(newRecord)
  _setArray(KEYS.RECORDS, records)

  // 更新物品库存
  const item = Store.getItemById(newRecord.itemId)
  if (item) {
    const delta = newRecord.type === Models.Record.TYPE_IN
      ? newRecord.quantity
      : -newRecord.quantity
    Store.updateItem(newRecord.itemId, { quantity: item.quantity + delta })
  }

  return newRecord
}

Store.getRecordsByItemId = function (itemId) {
  return Store.getAllRecords()
    .filter(r => r.itemId === itemId)
    .sort((a, b) => b.date - a.date)
}

// ============================
// 供应商 CRUD
// ============================
Store.getAllSuppliers = function () {
  return _getArray(KEYS.SUPPLIERS)
}

Store.addSupplier = function (data) {
  const suppliers = Store.getAllSuppliers()
  const newSupplier = Models.Supplier.create(data)
  suppliers.push(newSupplier)
  _setArray(KEYS.SUPPLIERS, suppliers)
  return newSupplier
}

Store.updateSupplier = function (id, data) {
  const suppliers = Store.getAllSuppliers()
  const index = suppliers.findIndex(s => s.id === id)
  if (index === -1) return null
  suppliers[index] = { ...suppliers[index], ...data, id: suppliers[index].id }
  _setArray(KEYS.SUPPLIERS, suppliers)
  return suppliers[index]
}

Store.deleteSupplier = function (id) {
  const suppliers = Store.getAllSuppliers()
  const filtered = _removeById(suppliers, id)
  if (filtered.length === suppliers.length) return false
  _setArray(KEYS.SUPPLIERS, filtered)
  return true
}

// ============================
// 已处理预警状态
// ============================
Store.getProcessedAlerts = function () {
  try {
    return JSON.parse(localStorage.getItem(KEYS.ALERTS)) || {}
  } catch {
    return {}
  }
}

Store.saveProcessedAlerts = function (processedIds) {
  localStorage.setItem(KEYS.ALERTS, JSON.stringify(processedIds))
}

// ============================
// 仪表盘统计
// ============================
Store.getDashboardStats = function () {
  const items = Store.getAllItems()
  const categories = Store.getAllCategories()
  const lowStockItems = Store.getLowStockItems()
  const recentRecords = Store.getAllRecords()
    .sort((a, b) => b.date - a.date)
    .slice(0, 10)

  return {
    totalItems: items.length,
    totalCategories: categories.length,
    lowStockCount: lowStockItems.length,
    lowStockItems,
    recentRecords
  }
}

// ============================
// 全局数据版本（用于触发页面刷新）
// ============================
Store.dataVersion = 0

Store.refresh = function () {
  Store.dataVersion++
}

window.Store = Store
</script>

<script>
/**
 * ==========================================
 * 路由 - router.js
 * ==========================================
 * 基于 Hash 的简单路由
 * 格式：#home, #inventory, #category, #alert, #statistics, #item-detail?id=xxx, #item-form?id=xxx
 * ==========================================
 */

const Router = {
  // 当前路由
  currentRoute: '',
  currentParams: {},
  // 版本号（用于强制刷新）
  _version: 0,

  // 初始化
  init() {
    // 监听 hashchange
    window.addEventListener('hashchange', () => this._onHashChange())
    // 初始化路由
    this._onHashChange()
  },

  // 解析 hash
  _parseHash(hash) {
    if (!hash || hash === '#') return { route: 'home', params: {} }
    hash = hash.replace(/^#/, '')
    const [path, queryString] = hash.split('?')
    const params = {}
    if (queryString) {
      queryString.split('&').forEach(pair => {
        const [key, value] = pair.split('=')
        if (key) params[decodeURIComponent(key)] = decodeURIComponent(value || '')
      })
    }
    return { route: path || 'home', params }
  },

  // 处理 hash 变化
  _onHashChange() {
    const { route, params } = this._parseHash(window.location.hash)
    this.currentRoute = route
    this.currentParams = params
    this._version++
    // 触发路由变化回调
    if (this._callback) {
      this._callback(route, params)
    }
  },

  // 跳转到指定路由
  navigate(route, params) {
    let hash = '#' + route
    if (params && Object.keys(params).length > 0) {
      const query = Object.entries(params)
        .map(([k, v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v))
        .join('&')
      hash += '?' + query
    }
    window.location.hash = hash
  },

  // 替换当前路由（不产生历史记录）
  replace(route, params) {
    let hash = '#' + route
    if (params && Object.keys(params).length > 0) {
      const query = Object.entries(params)
        .map(([k, v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v))
        .join('&')
      hash += '?' + query
    }
    window.history.replaceState(null, '', hash)
    this.currentRoute = route
    this.currentParams = params || {}
    this._version++
    if (this._callback) {
      this._callback(route, params || {})
    }
  },

  // 回退（支持自定义历史记录栈）
  back() {
    if (window.history.length > 1) {
      window.history.back()
    } else {
      this.navigate('home')
    }
  },

  // 获取路由参数
  getParam(key) {
    return this.currentParams[key] || ''
  },

  // 监听路由变化
  onChange(callback) {
    this._callback = callback
  }
}

window.Router = Router
</script>

<script>
/**
 * ==========================================
 * 工具函数 - utils.js
 * ==========================================
 * 作者：小凡 @ 2026-03-22
 * 用途：通用工具函数库（纯 JS，无微信依赖）
 * ==========================================
 */

/**
 * 生成唯一ID（带前缀）
 */
function generateId(prefix = 'id') {
  return prefix + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6)
}

/**
 * 格式化时间戳为可读日期
 */
function formatDate(timestamp, format = 'YYYY-MM-DD HH:mm') {
  if (!timestamp) return ''
  const d = new Date(timestamp)
  const year = d.getFullYear()
  const month = String(d.getMonth() + 1).padStart(2, '0')
  const day = String(d.getDate()).padStart(2, '0')
  const hour = String(d.getHours()).padStart(2, '0')
  const minute = String(d.getMinutes()).padStart(2, '0')
  const second = String(d.getSeconds()).padStart(2, '0')
  return format
    .replace('YYYY', year)
    .replace('MM', month)
    .replace('DD', day)
    .replace('HH', hour)
    .replace('mm', minute)
    .replace('ss', second)
}

/**
 * 格式化时间（MM-DD HH:mm 格式，用于列表显示）
 */
function formatDateShort(timestamp) {
  return formatDate(timestamp, 'MM-DD HH:mm')
}

/**
 * 防抖函数
 */
function debounce(fn, delay = 300) {
  let timer = null
  return function (...args) {
    if (timer) clearTimeout(timer)
    timer = setTimeout(() => fn.apply(this, args), delay)
  }
}

/**
 * 深拷贝
 */
function deepClone(obj) {
  return JSON.parse(JSON.stringify(obj))
}

/**
 * 数字千分位格式化
 */
function formatNumber(num) {
  return String(num).replace(/\B(?=(\d{3})+(?!\d))/g, ',')
}

/**
 * 格式化金额
 */
function formatCurrency(value) {
  if (value >= 10000) {
    return (value / 10000).toFixed(1) + '万'
  }
  return value.toLocaleString()
}

// 导出
window.utils = {
  generateId,
  formatDate,
  formatDateShort,
  debounce,
  deepClone,
  formatNumber,
  formatCurrency
}
</script>

<script>
/**
 * ==========================================
 * 页面渲染 - pages.js
 * ==========================================
 * 作者：小凡 @ 2026-03-22
 * 用途：所有页面的渲染逻辑和数据绑定

 */

/* ============================
   Toast & Modal 辅助
   ============================ */
function showToast(msg, type = '', duration = 2000) {
  const container = document.getElementById('toast-container')
  const toast = document.createElement('div')
  toast.className = 'toast' + (type ? ' ' + type : '')
  toast.textContent = msg
  container.appendChild(toast)
  setTimeout(() => {
    toast.style.animation = 'toastOut 0.2s ease forwards'
    setTimeout(() => toast.remove(), 200)
  }, duration)
}

function showConfirm(title, msg) {
  return new Promise((resolve) => {
    const mask = document.createElement('div')
    mask.className = 'modal-mask'
    mask.innerHTML = `
      <div class="modal-dialog">
        <div class="modal-header">
          <span class="modal-title">${title}</span>
          <span class="modal-close" id="modal-confirm-cancel">✕</span>
        </div>
        <div style="padding:12px 16px;font-size:14px;color:var(--text-secondary);line-height:1.5">${msg}</div>
        <div class="modal-footer">
          <div class="modal-cancel" id="modal-confirm-cancel-btn">取消</div>
          <div class="modal-confirm" style="flex:2;background:var(--primary-color)">确定</div>
        </div>
      </div>`
    document.body.appendChild(mask)

    const close = (result) => {
      mask.remove()
      resolve(result)
    }

    mask.querySelector('#modal-confirm-cancel').onclick = () => close(false)
    mask.querySelector('#modal-confirm-cancel-btn').onclick = () => close(false)
    mask.querySelector('.modal-confirm').onclick = () => close(true)
    mask.onclick = (e) => { if (e.target === mask) close(false) }
  })
}

function closeModal() {
  const existing = document.querySelector('.modal-mask')
  if (existing) existing.remove()
}

/* ============================
   picker Sheet 辅助
   ============================ */
function showPickerSheet(title, options, selectedId, onSelect) {
  // 关闭已存在的 sheet
  closePickerSheet()

  const sheet = document.createElement('div')
  sheet.className = 'cat-picker-sheet'
  sheet.id = 'picker-sheet'
  sheet.innerHTML = `
    <div class="picker-sheet-header">
      <span class="picker-sheet-title">${title}</span>
      <span class="picker-sheet-close" id="picker-sheet-close">✕</span>
    </div>
    ${options.map(opt => `
      <div class="picker-option ${opt.id === selectedId ? 'selected' : ''}" data-id="${opt.id}">
        <span>${opt.name}</span>
        ${opt.id === selectedId ? '<span class="picker-option-check">✓</span>' : ''}
      </div>
    `).join('')}
  `
  document.body.appendChild(sheet)

  // 点击选项
  sheet.querySelectorAll('.picker-option').forEach(el => {
    el.onclick = () => {
      const id = el.dataset.id
      closePickerSheet()
      onSelect(id, options.find(o => o.id === id))
    }
  })

  // 关闭按钮
  sheet.querySelector('#picker-sheet-close').onclick = closePickerSheet

  // 点击遮罩关闭
  sheet.ontouchstart = (e) => {
    if (e.target === sheet) closePickerSheet()
  }
}

function closePickerSheet() {
  const existing = document.getElementById('picker-sheet')
  if (existing) existing.remove()
}

/* ============================
   分类弹窗（新增/编辑分类）
   ============================ */
function showCategoryModal(mode, editingCat, onSave, onDelete) {
  closeModal()
  const isEdit = mode === 'edit'
  const title = isEdit ? '编辑分类' : '新增分类'
  const cats = Store.getAllCategories()
  const topLevel = cats.filter(c => !c.parentId || c.parentId === '')
  const defaultParentId = editingCat ? editingCat.parentId || '' : ''
  const defaultName = editingCat ? editingCat.name : ''
  const defaultOrder = editingCat ? (editingCat.order || '') : ''

  // 如果是新增子分类模式
  const forceParentId = mode === 'addChild' ? (editingCat && editingCat.id) : null

  const mask = document.createElement('div')
  mask.className = 'modal-mask cat-form-modal'
  mask.innerHTML = `
    <div class="modal-dialog">
      <div class="modal-header">
        <span class="modal-title">${title}</span>
        <span class="modal-close" id="cat-modal-close">✕</span>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label class="form-row-label">分类名称 <span class="required">*</span></label>
          <input id="cat-form-name" value="${defaultName}" placeholder="例如：办公用品" maxlength="20" />
        </div>
        ${!forceParentId ? `
        <div class="form-row" id="cat-parent-row">
          <label class="form-row-label">设为子分类</label>
          <div class="cat-picker-row" id="cat-parent-picker">
            <span id="cat-parent-name">无（顶级分类）</span>
            <span class="picker-arrow">›</span>
          </div>
        </div>` : ''}
        <div class="form-row">
          <label class="form-row-label">排序权重</label>
          <input id="cat-form-order" type="number" value="${defaultOrder}" placeholder="数字越小排越前（默认99）" />
        </div>
      </div>
      <div class="modal-footer" id="cat-form-footer">
        ${isEdit ? `<div class="modal-cancel" style="flex:1" id="cat-form-delete-btn">删除</div>` : ''}
        <div class="modal-cancel" id="cat-form-cancel-btn" style="${isEdit ? 'flex:1' : 'flex:1'}">取消</div>
        <div class="modal-confirm" id="cat-form-save-btn" style="${isEdit ? 'flex:2' : 'flex:2'}">保存</div>
      </div>
    </div>`

  document.body.appendChild(mask)

  let selectedParentId = defaultParentId

  // 父分类选择
  const parentRow = document.getElementById('cat-parent-row')
  const parentPicker = document.getElementById('cat-parent-picker')
  const parentNameEl = document.getElementById('cat-parent-name')

  function updateParentName() {
    if (!selectedParentId) {
      parentNameEl.textContent = '无（顶级分类）'
    } else {
      const cat = cats.find(c => c.id === selectedParentId)
      parentNameEl.textContent = cat ? cat.name : '无（顶级分类）'
    }
  }

  if (parentPicker) {
    parentPicker.onclick = () => {
      const opts = [{ id: '', name: '无（顶级分类）' }, ...topLevel]
      showPickerSheet('选择父分类', opts, selectedParentId, (id) => {
        selectedParentId = id
        updateParentName()
      })
    }
  }

  // 关闭
  mask.querySelector('#cat-modal-close').onclick = () => mask.remove()
  mask.querySelector('#cat-form-cancel-btn').onclick = () => mask.remove()
  mask.onclick = (e) => { if (e.target === mask) mask.remove() }

  // 保存
  mask.querySelector('#cat-form-save-btn').onclick = () => {
    const name = document.getElementById('cat-form-name').value.trim()
    const order = parseInt(document.getElementById('cat-form-order').value) || 99
    if (!name) {
      showToast('请输入分类名称', 'error')
      return
    }
    mask.remove()
    onSave({ name, parentId: selectedParentId || '', order })
  }

  // 删除（编辑模式）
  if (isEdit && editingCat) {
    mask.querySelector('#cat-form-delete-btn').onclick = () => {
      mask.remove()
      onDelete(editingCat)
    }
  }
}

/* ============================
   入库/出库弹窗
   ============================ */
function showActionModal(item, type, onConfirm) {
  closeModal()
  const isIn = type === 'in'
  const title = isIn ? '入库' : '出库'

  const mask = document.createElement('div')
  mask.className = 'modal-mask action-modal'
  mask.innerHTML = `
    <div class="modal-dialog">
      <div class="modal-header">
        <span class="modal-title">${title}</span>
        <span class="modal-close" id="action-modal-close">✕</span>
      </div>
      <div class="modal-stock-tip">

      </div>
      <div class="modal-field">
        <label class="field-label">数量 <span class="required">*</span></label>
        <div class="field-input-wrap">
          <input class="field-input" id="action-qty" type="number" placeholder="请输入数量" />
          <span class="field-unit">${item.unit}</span>
        </div>

      <div class="modal-field">
        <label class="field-label">备注</label>
        <textarea class="field-textarea" id="action-note" placeholder="可填写来源、用途等备注信息" maxlength="100" rows="2"></textarea>
      </div>
      <div class="modal-footer">

        <div class="modal-confirm ${isIn ? 'confirm-in' : 'confirm-out'}" id="action-confirm">确认${title}</div>
      </div>
    </div>`

  document.body.appendChild(mask)

  const qtyInput = mask.querySelector('#action-qty')
  qtyInput.focus()

  mask.querySelector('#action-modal-close').onclick = () => mask.remove()
  mask.querySelector('#action-cancel').onclick = () => mask.remove()
  mask.onclick = (e) => { if (e.target === mask) mask.remove() }

  mask.querySelector('#action-confirm').onclick = () => {
    const qty = parseInt(qtyInput.value)
    const note = mask.querySelector('#action-note').value.trim()

    if (!qty || qty <= 0) {
      showToast('请输入有效数量', 'error')
      return
    }
    if (!isIn && qty > item.quantity) {
      showToast(`库存不足，当前仅有 ${item.quantity} ${item.unit}`, 'error')
      return
    }
    mask.remove()
    onConfirm(qty, note)
  }
}

/* ============================
   库存页渲染
   ============================ */
let invSearchKw = ''
let invSelectedCat = ''

function renderInventory() {
  const allItems = Store.getAllItems()
  const categories = Store.getAllCategories()
  const catMap = {}
  categories.forEach(c => { catMap[c.id] = c.name })

  // 分类标签
  const tabsEl = document.getElementById('inv-category-tabs')
  const allTabs = [{ id: '', name: '全部' }, ...categories]
  tabsEl.innerHTML = allTabs.map(cat =>
    `<div class="category-tab ${invSelectedCat === cat.id ? 'active' : ''}" data-catid="${cat.id}">${cat.name}</div>`
  ).join('')
  tabsEl.querySelectorAll('.category-tab').forEach(el => {
    el.onclick = () => {
      invSelectedCat = el.dataset.catid
      renderInventory()
    }
  })

  // 搜索
  const searchInput = document.getElementById('inv-search')
  searchInput.value = invSearchKw
  searchInput.oninput = utils.debounce(() => {
    invSearchKw = searchInput.value.trim()
    renderInventory()
  }, 300)
  searchInput.onsubmit = (e) => { e.preventDefault(); renderInventory() }

  const clearBtn = document.getElementById('inv-search-clear')
  clearBtn.style.display = invSearchKw ? 'inline' : 'none'
  clearBtn.onclick = () => {
    invSearchKw = ''
    searchInput.value = ''
    renderInventory()
  }

  // 筛选
  let items = allItems
  if (invSelectedCat) {
    items = items.filter(i => i.categoryId === invSelectedCat)
  }
  if (invSearchKw) {
    const kw = invSearchKw.toLowerCase()
    items = items.filter(i => i.name.toLowerCase().includes(kw))
  }

  // 渲染列表
  const listEl = document.getElementById('inv-item-list')
  const emptyEl = document.getElementById('inv-empty')
  const emptyTextEl = document.getElementById('inv-empty-text')

  if (items.length === 0) {
    listEl.innerHTML = ''
    emptyEl.style.display = 'flex'
    emptyTextEl.textContent = (invSearchKw || invSelectedCat) ? '没有找到匹配的物品' : '暂无物品，点击右下角添加'
  } else {
    emptyEl.style.display = 'none'
    listEl.innerHTML = items.map(item => {
      const isLow = item.minStock > 0 && item.quantity <= item.minStock
      return `
        <div class="item-card ${isLow ? 'low-stock' : ''}" data-id="${item.id}">
          ${isLow ? '<div class="low-stock-badge">库存不足</div>' : ''}
          <div class="item-main">
            <div class="item-name">${item.name}</div>
            <div class="item-category-tag">${catMap[item.categoryId] || '未分类'}</div>
          </div>
          <div class="item-stock">
            <div class="stock-number ${isLow ? 'stock-danger' : ''}">${item.quantity}</div>
            <div class="stock-unit">${item.unit}</div>
          </div>
          <div class="item-arrow">›</div>
        </div>`
    }).join('')
    listEl.querySelectorAll('.item-card').forEach(el => {
      el.onclick = () => Router.navigate('item-detail', { id: el.dataset.id })
    })
  }

   物品详情页渲染
   ============================ */

function renderItemDetail(itemId) {
  const item = Store.getItemById(itemId)
  if (!item) {
    showToast('物品不存在', 'error')
    setTimeout(() => Router.navigate('inventory'), 1500)
    return
  }

  currentDetailItem = item
  const cats = Store.getAllCategories()
  const suppliers = Store.getAllSuppliers()
  const cat = cats.find(c => c.id === item.categoryId)
  const sup = suppliers.find(s => s.id === item.supplierId)
  const isLow = item.minStock > 0 && item.quantity <= item.minStock

  document.getElementById('detail-item-name').textContent = item.name
  document.getElementById('detail-name').textContent = item.name
  document.getElementById('detail-category').textContent = cat ? cat.name : '未分类'
  document.getElementById('detail-quantity').textContent = item.quantity
  document.getElementById('detail-unit').textContent = item.unit
  document.getElementById('detail-quantity').className = 'stock-big-number' + (isLow ? ' danger' : '')

  const tipEl = document.getElementById('detail-low-tip')
  tipEl.style.display = isLow ? 'block' : 'none'

  const minRow = document.getElementById('detail-min-stock-row')
  if (item.minStock > 0) {
    minRow.style.display = 'flex'
    document.getElementById('detail-min-stock').textContent = item.minStock + ' ' + item.unit
  } else {
    minRow.style.display = 'none'
  }

  document.getElementById('detail-location').textContent = item.location || '—'
  document.getElementById('detail-supplier').textContent = sup ? sup.name : '—'
  document.getElementById('detail-price').textContent = item.price > 0 ? '¥' + item.price : '—'
  document.getElementById('detail-created').textContent = utils.formatDate(item.createdAt, 'YYYY-MM-DD HH:mm')

  // 出入库记录
  const records = Store.getRecordsByItemId(itemId).slice(0, 10)
  const recList = document.getElementById('detail-record-list')
  const noRecEl = document.getElementById('detail-no-records')

  if (records.length > 0) {
    noRecEl.style.display = 'none'
    recList.style.display = 'flex'
    recList.innerHTML = records.map(rec => `
      <div class="record-item">
        <div class="record-dot ${rec.type === 'in' ? 'dot-in' : 'dot-out'}"></div>
        <div class="record-type-badge ${rec.type === 'in' ? 'badge-in' : 'badge-out'}">
          ${rec.type === 'in' ? '入库' : '出库'}
        </div>
        <div class="record-info">
          <div class="record-note">${rec.note || '无备注'}</div>
          <div class="record-time">${utils.formatDateShort(rec.date)}</div>
        </div>
        <div class="record-qty ${rec.type === 'in' ? 'qty-in' : 'qty-out'}">
          ${rec.type === 'in' ? '+' : '-'}${rec.quantity}
        </div>
      </div>
    `).join('')
  } else {
    recList.style.display = 'none'
    noRecEl.style.display = 'block'
  }
}

/* ============================
   物品表单页渲染
   ============================ */
let formItemId = null
let formCatOptions = []
let formSupOptions = []
let formSelectedCatId = ''
let formSelectedSupId = ''
let formUnitOptions = ['个', '箱', '件', '包', '袋', '瓶', '桶', '千克', '克', '升', '毫升', '米', '套', '台', '张']
let formUnitIndex = 0
let formShowCustomUnit = false

function renderItemForm(itemId) {
  formItemId = itemId || null
  const isEdit = !!formItemId

  document.getElementById('form-page-title').textContent = isEdit ? '编辑物品' : '新增物品'
  document.getElementById('form-submit-btn').textContent = isEdit ? '保存修改' : '添加物品'

  // 加载分类和供应商
  formCatOptions = [{ id: '', name: '请选择分类' }, ...Store.getAllCategories()]
  formSupOptions = [{ id: '', name: '无（可选）' }, ...Store.getAllSuppliers()]

  // 重置状态
  formSelectedCatId = ''
  formSelectedSupId = ''
  formUnitIndex = 0
  formShowCustomUnit = false

  // 编辑模式：加载已有数据
  if (isEdit) {
    const item = Store.getItemById(itemId)
    if (item) {
      document.getElementById('form-name').value = item.name
      formSelectedCatId = item.categoryId
      formSelectedSupId = item.supplierId || ''
      formUnitIndex = formUnitOptions.indexOf(item.unit)
      if (formUnitIndex === -1) {
        formUnitIndex = 0
        formUnitOptions.unshift(item.unit)
      }

      document.getElementById('form-quantity').value = item.quantity
      document.getElementById('form-min-stock').value = item.minStock > 0 ? item.minStock : ''
      document.getElementById('form-location').value = item.location || ''
      document.getElementById('form-price').value = item.price > 0 ? item.price : ''
    }
  } else {
    // 新增模式：清空表单
    document.getElementById('form-name').value = ''
    document.getElementById('form-quantity').value = ''
    document.getElementById('form-min-stock').value = ''
    document.getElementById('form-location').value = ''
    document.getElementById('form-price').value = ''
  }

  updateFormPickers()
}

function updateFormPickers() {
  const catEl = document.getElementById('form-cat-name')
  const supEl = document.getElementById('form-sup-name')
  const unitWrap = document.getElementById('form-unit-wrap')
  const customWrap = document.getElementById('form-custom-unit-wrap')
  const unitPickerEl = document.getElementById('form-unit-name')

  // 分类名
  const catOpt = formCatOptions.find(o => o.id === formSelectedCatId)
  catEl.textContent = catOpt ? catOpt.name : '请选择分类'

  // 供应商名
  const supOpt = formSupOptions.find(o => o.id === formSelectedSupId)
  supEl.textContent = supOpt ? supOpt.name : '无（可选）'

  // 单位
  const currentUnit = formUnitOptions[formUnitIndex] || '个'
  if (formShowCustomUnit) {
    unitWrap.style.display = 'none'
    customWrap.style.display = 'flex'
    document.getElementById('form-custom-unit').value = currentUnit
    document.getElementById('form-min-unit').textContent = currentUnit
  } else {
    unitWrap.style.display = 'flex'
    customWrap.style.display = 'none'
    unitPickerEl.textContent = currentUnit
    document.getElementById('form-min-unit').textContent = currentUnit
  }
}

function setupFormEvents() {
  // 分类选择
  document.getElementById('form-cat-picker').onclick = () => {
    showPickerSheet('选择分类', formCatOptions, formSelectedCatId, (id, opt) => {
      formSelectedCatId = id
      updateFormPickers()
    })
  }

  // 供应商选择
  document.getElementById('form-sup-picker').onclick = () => {
    showPickerSheet('选择供应商', formSupOptions, formSelectedSupId, (id, opt) => {
      formSelectedSupId = id
      updateFormPickers()
    })
  }

  // 单位预设选择
  document.getElementById('form-unit-picker').onclick = () => {
    showPickerSheet('选择单位', formUnitOptions.map((u, i) => ({ id: i, name: u })), formUnitIndex, (id) => {
      formUnitIndex = parseInt(id)
      updateFormPickers()
    })
  }

  // 自定义单位按钮
  document.getElementById('form-unit-custom-btn').onclick = () => {
    formShowCustomUnit = true
    updateFormPickers()
    setTimeout(() => {
      const input = document.getElementById('form-custom-unit')
      input.focus()
    }, 50)
  }

  // 确认自定义单位
  document.getElementById('form-unit-done').onclick = () => {
    const unit = document.getElementById('form-custom-unit').value.trim()
    if (!unit) {
      showToast('请输入单位', 'error')
      return
    }
    // 更新单位列表
    if (!formUnitOptions.includes(unit)) {
      formUnitOptions.push(unit)
    }
    formUnitIndex = formUnitOptions.indexOf(unit)
    formShowCustomUnit = false
    updateFormPickers()
  }

  // 提交
  document.getElementById('form-submit-btn').onclick = () => {
    const name = document.getElementById('form-name').value.trim()
    const quantity = parseFloat(document.getElementById('form-quantity').value) || 0
    const minStock = parseFloat(document.getElementById('form-min-stock').value) || 0
    const location = document.getElementById('form-location').value.trim()
    const price = parseFloat(document.getElementById('form-price').value) || 0
    const unit = formUnitOptions[formUnitIndex] || '个'

    if (!name) {
      showToast('请输入物品名称', 'error')
      return
    }
    if (!formSelectedCatId) {
      showToast('请选择物品分类', 'error')
      return
    }
    if (isNaN(quantity) || quantity < 0) {
      showToast('请输入有效的库存数量', 'error')
      return
    }

    const data = {
      name,
      categoryId: formSelectedCatId,
      quantity,
      unit,
      minStock,
      location,
      supplierId: formSelectedSupId,
      price
    }

    if (formItemId) {
      Store.updateItem(formItemId, data)
      showToast('保存成功', 'success')
    } else {
      Store.addItem(data)
      showToast('添加成功', 'success')
    }

    Store.refresh()
    setTimeout(() => Router.navigate('inventory'), 1200)
  }
}

/* ============================
   分类管理页渲染
   ============================ */
function renderCategory() {
  const categories = Store.getAllCategories()
  const allItems = Store.getAllItems()
  const countMap = {}
  allItems.forEach(item => {
    if (item.categoryId) countMap[item.categoryId] = (countMap[item.categoryId] || 0) + 1
  })

  const topLevel = categories
    .filter(c => !c.parentId || c.parentId === '')
    .sort((a, b) => a.order - b.order)

  const displayList = []
  topLevel.forEach(top => {
    displayList.push({ ...top, itemCount: countMap[top.id] || 0, _isTop: true })
    categories
      .filter(c => c.parentId === top.id)
      .sort((a, b) => a.order - b.order)
      .forEach(child => {
        displayList.push({ ...child, itemCount: countMap[child.id] || 0, _isChild: true })
      })
  })

  document.getElementById('cat-count-text').textContent = `共 ${categories.length} 个分类`

  const listEl = document.getElementById('cat-list')
  const emptyEl = document.getElementById('cat-empty')

  if (displayList.length === 0) {
    listEl.innerHTML = ''
    emptyEl.style.display = 'flex'
  } else {
    emptyEl.style.display = 'none'
    listEl.innerHTML = displayList.map(cat => `
      ${cat._isTop ? `
      <div class="cat-item cat-top">
        <div class="cat-left">
          <span class="cat-icon">📁</span>
          <div class="cat-info">
            <div class="cat-name">${cat.name}</div>
            <div class="cat-meta">
              <span class="cat-count">${cat.itemCount} 个物品</span>
              ${cat.order && cat.order !== 99 ? `<span class="cat-order">排序: ${cat.order}</span>` : ''}
            </div>
          </div>
        </div>
        <div class="cat-actions">
          <div class="cat-btn cat-btn-add" data-action="add-child" data-id="${cat.id}">+ 子分类</div>
          <div class="cat-btn" data-action="edit-cat" data-id="${cat.id}">编辑</div>
          <div class="cat-btn cat-btn-danger" data-action="delete-cat" data-id="${cat.id}">删除</div>
        </div>
      </div>` : `
      <div class="cat-item cat-child">
        <div class="cat-left">
          <span class="cat-icon" style="font-size:16px">📄</span>
          <div class="cat-info">
            <div class="cat-name">${cat.name}</div>
            <div class="cat-meta">
              <span class="cat-count">${cat.itemCount} 个物品</span>
            </div>
          </div>
        </div>
        <div class="cat-actions">
          <div class="cat-btn" data-action="edit-cat" data-id="${cat.id}">编辑</div>
          <div class="cat-btn cat-btn-danger" data-action="delete-cat" data-id="${cat.id}">删除</div>
        </div>
      </div>`}
    `).join('')

    // 绑定事件
    listEl.querySelectorAll('.cat-btn').forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation()
        const action = btn.dataset.action
        const id = btn.dataset.id

        if (action === 'add-child') {
          showCategoryModal('addChild', { id }, (data) => {
            Store.addCategory(data)
            Store.refresh()
            showToast('新增成功', 'success')
            renderCategory()
          }, null)
        } else if (action === 'edit-cat') {
          const cat = categories.find(c => c.id === id)
          showCategoryModal('edit', cat, (data) => {
            Store.updateCategory(id, data)
            Store.refresh()
            showToast('保存成功', 'success')
            renderCategory()
          }, (cat) => {
            handleDeleteCategory(cat)
          })
        } else if (action === 'delete-cat') {
          const cat = categories.find(c => c.id === id)
          handleDeleteCategory(cat)
        }
      }
    })
  }

  // 新增顶级分类
  document.getElementById('cat-add-btn').onclick = () => {
    showCategoryModal('add', null, (data) => {
      Store.addCategory(data)
      Store.refresh()
      showToast('新增成功', 'success')
      renderCategory()
    }, null)
  }
}

async function handleDeleteCategory(cat) {
  const categories = Store.getAllCategories()
  const allItems = Store.getAllItems()

  const hasItems = allItems.some(item => item.categoryId === cat.id)
  if (hasItems) {
    showToast(`「${cat.name}」分类下已有物品，请先删除或移出该分类下的物品后再试。`, 'error')
    return
  }

  const hasChildren = categories.some(c => c.parentId === cat.id)
  if (hasChildren) {
    showToast(`「${cat.name}」下还有子分类，请先删除子分类后再试。`, 'error')
    return
  }

  const confirmed = await showConfirm('确认删除', `确定要删除分类「${cat.name}」吗？`)
  if (confirmed) {
    Store.deleteCategory(cat.id)
    Store.refresh()
    showToast('已删除', 'success')
    renderCategory()
  }
}

/* ============================
   预警页渲染
   ============================ */
let alertProcessedIds = {}

function renderAlert() {
  const items = Store.getAllItems()
  const categories = Store.getAllCategories()
  const catMap = {}
  categories.forEach(c => { catMap[c.id] = c.name })

  alertProcessedIds = Store.getProcessedAlerts()

  const lowItems = items.filter(item => item.minStock > 0 && item.quantity <= item.minStock)

  const alertList = lowItems.map(item => {
    const ratio = item.minStock > 0 ? item.quantity / item.minStock : 1
    const gap = item.minStock - item.quantity
    const suggest = Math.max(0, item.minStock * 2 - item.quantity)
    return {
      ...item,
      categoryName: catMap[item.categoryId] || '未分类',
      gap, suggest, ratio,
      isProcessed: !!alertProcessedIds[item.id]
    }
  }).sort((a, b) => {
    if (a.isProcessed !== b.isProcessed) return a.isProcessed ? 1 : -1
    return a.ratio - b.ratio
  })

  const pendingCount = alertList.filter(a => !a.isProcessed).length

  const actionsEl = document.getElementById('alert-actions')
  const allClearEl = document.getElementById('alert-all-clear')
  const listEl = document.getElementById('alert-list')
  const pendingTextEl = document.getElementById('alert-pending-text')

  if (alertList.length === 0) {
    actionsEl.style.display = 'none'
    allClearEl.style.display = 'flex'
    listEl.innerHTML = ''
  } else {
    allClearEl.style.display = 'none'
    actionsEl.style.display = 'flex'
    pendingTextEl.textContent = pendingCount > 0 ? `${pendingCount} 项待处理` : ''

    const markAllBtn = document.getElementById('alert-mark-all-btn')
    const resetBtn = document.getElementById('alert-reset-btn')
    markAllBtn.style.display = pendingCount > 0 ? 'inline-block' : 'none'
    resetBtn.style.display = pendingCount === 0 ? 'inline-block' : 'none'

    markAllBtn.onclick = () => {
      alertList.forEach(item => { alertProcessedIds[item.id] = true })
      Store.saveProcessedAlerts(alertProcessedIds)
      Store.refresh()
      renderAlert()
    }

    resetBtn.onclick = () => {
      alertProcessedIds = {}
      Store.saveProcessedAlerts(alertProcessedIds)
      Store.refresh()
      renderAlert()
    }

    listEl.innerHTML = alertList.map(item => {
      const level = item.ratio <= 0.3 ? 'danger' : item.ratio <= 0.7 ? 'warning' : 'safe'
      const levelText = level === 'danger' ? '紧急' : level === 'warning' ? '预警' : '正常'
      const levelColor = level === 'danger' ? '#e74c3c' : level === 'warning' ? '#f39c12' : '#27ae60'
      return `
        <div class="alert-item ${item.isProcessed ? 'processed' : ''}" data-id="${item.id}">
          <div class="alert-level-bar" style="background:${levelColor}"></div>
          <div class="alert-content">
            <div class="alert-name">${item.name}</div>
            <div class="alert-detail-home">当前：${item.quantity}${item.unit} / 预警：${item.minStock}${item.unit}</div>
            <div class="alert-meta">
              <span class="alert-level-tag" style="background:${levelColor}">${levelText}</span>
              <span class="alert-gap">缺口：${item.gap}${item.unit}</span>
              <span class="alert-suggest">建议补货：${item.suggest}${item.unit}</span>
            </div>
          </div>
          ${!item.isProcessed ? '<div class="alert-mark-done" data-action="alert-mark-done" data-id="' + item.id + '">✓</div>' : '<div class="alert-done-tag">已处理</div>'}
        </div>
      `
    }).join('')

    listEl.querySelectorAll('.alert-mark-done').forEach(el => {
      el.onclick = () => {
        const id = el.dataset.id
        alertProcessedIds[id] = true
        Store.saveProcessedAlerts(alertProcessedIds)
        Store.refresh()
        renderAlert()
      }
    })
  }
}

function showToast(msg, type, duration) {
  if (!duration) duration = 2000
  const container = document.getElementById('toast-container')
  if (!container) return
  const toast = document.createElement('div')
  toast.className = 'toast toast-' + (type || 'info')
  toast.textContent = msg
  container.appendChild(toast)
  setTimeout(() => toast.classList.add('toast-show'), 10)
  setTimeout(() => {
    toast.classList.remove('toast-show')
    setTimeout(() => { if (container.contains(toast)) container.removeChild(toast) }, 300)
  }, duration)
}

function showConfirm(title, msg) {
  return new Promise((resolve) => {
    const mask = document.createElement('div')
    mask.className = 'modal-mask'
    mask.innerHTML = `
      <div class="modal-box">
        <div class="modal-title">${title}</div>
        <div class="modal-body">${msg}</div>
        <div class="modal-footer">
          <div class="modal-btn modal-btn-cancel" id="modal-cancel">取消</div>
          <div class="modal-btn modal-btn-confirm" id="modal-confirm-btn">确定</div>
        </div>
      </div>
    `
    document.body.appendChild(mask)
    mask.querySelector('#modal-cancel').onclick = () => {
      document.body.removeChild(mask)
      resolve(false)
    }
    mask.querySelector('#modal-confirm-btn').onclick = () => {
      document.body.removeChild(mask)
      resolve(true)
    }
    mask.onclick = (e) => { if (e.target === mask) { document.body.removeChild(mask); resolve(false) } }
  })
}

function showActionModal(item, type, onConfirm) {
  const title = type === 'in' ? '入库' : '出库'
  const icon = type === 'in' ? '📥' : '📤'
  const mask = document.createElement('div')
  mask.className = 'modal-mask'
  mask.innerHTML = `
    <div class="modal-box">
      <div class="modal-title">${icon} ${title} - ${item.name}</div>
      <div class="modal-body">
        <div class="form-group">
          <label>数量</label>
          <input class="form-input" id="modal-qty" type="number" min="1" placeholder="请输入数量">
        </div>
        <div class="form-group">
          <label>备注</label>
          <input class="form-input" id="modal-note" type="text" placeholder="可选">
        </div>
      </div>
      <div class="modal-footer">
        <div class="modal-btn modal-btn-cancel" id="modal-cancel">取消</div>
        <div class="modal-btn modal-btn-confirm" id="modal-confirm-btn">确定${title}</div>
      </div>
    </div>
  `
  document.body.appendChild(mask)
  mask.querySelector('#modal-cancel').onclick = () => document.body.removeChild(mask)
  mask.querySelector('#modal-confirm-btn').onclick = () => {
    const qty = parseInt(mask.querySelector('#modal-qty').value)
    const note = mask.querySelector('#modal-note').value
    if (!qty || qty <= 0) {
      showToast('请输入有效数量', 'error')
      return
    }
    if (type === 'out' && qty > item.quantity) {
      showToast('库存不足，当前仅有 ' + item.quantity + ' ' + item.unit, 'error')
      return
    }
    document.body.removeChild(mask)
    onConfirm(qty, note)
  }
}</script>

<script>
/**
 * ==========================================
 * 应用入口 - app.js
 * ==========================================
 * 作者：小凡 @ 2026-03-22
 * 用途：H5 应用入口，初始化 Store、Router、TabBar、全局事件
 * ==========================================
 */

// ============================
// TabBar 切换
// ============================
function initTabbar() {
  const tabbar = document.getElementById('tabbar')
  if (!tabbar) return
  
  tabbar.addEventListener('click', (e) => {
    const tabItem = e.target.closest('.tab-item')
    if (!tabItem) return
    const page = tabItem.dataset.page
    if (page) {
      Router.navigate(page)
    }
  })
}

// ============================
// 全局动作处理
// ============================
function handleGlobalAction(action) {
  switch (action) {
    // TabBar 导航
    case 'go-inventory':
      Router.navigate('inventory')
      break
    case 'go-category':
      Router.navigate('category')
      break
    case 'go-alert':
      Router.navigate('alert')
      break
    case 'go-statistics':
      Router.navigate('statistics')
      break
    case 'go-home':
      Router.navigate('home')
      break
    
    // 物品操作
    case 'go-item-form':
      const itemId = Router.getParam('id')
      Router.navigate('item-form', itemId ? { id: itemId } : {})
      break
    case 'detail-edit':
      Router.navigate('item-form', { id: currentDetailItem?.id })
      break
    case 'detail-delete':
      handleDetailDelete()
      break
    case 'detail-in':
      showActionModal(currentDetailItem, 'in', (qty, note) => {
        Store.addRecord({
          itemId: currentDetailItem.id,
          type: 'in',
          quantity: qty,
          note: note
        })
        Store.refresh()
        showToast('入库成功', 'success')
        renderItemDetail(currentDetailItem.id)
      })
      break
    case 'detail-out':
      showActionModal(currentDetailItem, 'out', (qty, note) => {
        Store.addRecord({
          itemId: currentDetailItem.id,
          type: 'out',
          quantity: qty,
          note: note
        })
        Store.refresh()
        showToast('出库成功', 'success')
        renderItemDetail(currentDetailItem.id)
      })
      break
    
    // 返回
    case 'go-back':
      Router.back()
      break
    
    // 分类操作（在 renderCategory 中动态绑定）
    case 'add-child':
    case 'edit-cat':
    case 'delete-cat':
      // 这些动作在 pages.js 的 renderCategory 中已处理
      break
    
    default:
      console.warn('Unknown action:', action)
  }
}

// ============================
// 物品详情页删除处理
// ============================
async function handleDetailDelete() {
  if (!currentDetailItem) return
  
  const confirmed = await showConfirm('确认删除', `确定要删除物品「${currentDetailItem.name}」吗？此操作不可恢复。`)
  if (confirmed) {
    Store.deleteItem(currentDetailItem.id)
    Store.refresh()
    showToast('已删除', 'success')
    setTimeout(() => Router.navigate('inventory'), 1000)
  }
}

// ============================
// 全局点击事件代理
// ============================
function initGlobalActions() {
  document.addEventListener('click', (e) => {
    const action = e.target.closest('[data-action]')?.dataset.action
    if (!action) return
    handleGlobalAction(action)
  })
}

// ============================
// 页面切换显示/隐藏
// ============================
function initPageSwitcher() {
  Router.onChange((route, params) => {
    // 隐藏所有页面
    document.querySelectorAll('.page').forEach(page => {
      page.style.display = 'none'
    })
    
    // 显示当前页面
    const pageEl = document.getElementById('page-' + route)
    if (pageEl) {
      pageEl.style.display = 'block'
    } else {
      // 页面不存在时显示首页
      document.getElementById('page-home').style.display = 'block'
    }
    
    // 更新 TabBar 选中状态
    document.querySelectorAll('.tab-item').forEach(tab => {
      tab.classList.remove('active')
      if (tab.dataset.page === route) {
        tab.classList.add('active')
      }
    })
    
    // 渲染对应页面
    switch (route) {
      case 'home':
        renderHome()
        break
      case 'inventory':
        renderInventory()
        break
      case 'item-detail':
        if (params.id) renderItemDetail(params.id)
        break
      case 'item-form':
        renderItemForm(params.id)
        setupFormEvents()
        break
      case 'category':
        renderCategory()
        break
      case 'alert':
        renderAlert()
        break
      case 'statistics':
        renderStatistics()
        break
    }
    
    // 滚动到顶部
    window.scrollTo(0, 0)
  })
}

// ============================
// 统计页渲染
// ============================
function renderStatistics() {
  const stats = Store.getDashboardStats()
  const records = Store.getAllRecords()
  const items = Store.getAllItems()
  const cats = Store.getAllCategories()
  const now = Date.now()
  
  // 计算本周/本月/季度的记录
  const weekAgo = now - 7 * 24 * 60 * 60 * 1000
  const monthAgo = now - 30 * 24 * 60 * 60 * 1000
  const quarterAgo = now - 90 * 24 * 60 * 60 * 1000
  
  const weekRecords = records.filter(r => r.date >= weekAgo)
  const monthRecords = records.filter(r => r.date >= monthAgo)
  const quarterRecords = records.filter(r => r.date >= quarterAgo)
  
  function calcNet(recs) {
    let totalIn = 0, totalOut = 0
    recs.forEach(r => {
      if (r.type === 'in') totalIn += r.quantity
      else totalOut += r.quantity
    })
    return { totalIn, totalOut, net: totalIn - totalOut }
  }
  
  const weekStats = calcNet(weekRecords)
  const monthStats = calcNet(monthRecords)
  const quarterStats = calcNet(quarterRecords)
  
  // 默认显示本周
  document.getElementById('stat-in-total').textContent = weekStats.totalIn
  document.getElementById('stat-out-total').textContent = weekStats.totalOut
  document.getElementById('stat-net').textContent = (weekStats.net >= 0 ? '+' : '') + weekStats.net
  
  // 库存总价值
  const totalValue = items.reduce((sum, item) => sum + (item.price || 0) * (item.quantity || 0), 0)
  document.getElementById('stat-value').textContent = '¥' + totalValue.toFixed(2)
  
  // 更新维度标签切换
  const dimTabs = document.querySelectorAll('.dim-tab')
  dimTabs.forEach(tab => {
    tab.onclick = () => {
      dimTabs.forEach(t => t.classList.remove('active'))
      tab.classList.add('active')
      const dim = tab.dataset.dim
      let s
      if (dim === 'week') s = weekStats
      else if (dim === 'month') s = monthStats
      else s = quarterStats
      document.getElementById('stat-in-total').textContent = s.totalIn
      document.getElementById('stat-out-total').textContent = s.totalOut
      document.getElementById('stat-net').textContent = (s.net >= 0 ? '+' : '') + s.net
    }
  })
  
  // 消耗排行（出库 Top5）
  const outRanking = {}
  records.forEach(r => {
    if (r.type === 'out') {
      outRanking[r.itemId] = (outRanking[r.itemId] || 0) + r.quantity
    }
  })
  const topItems = Object.entries(outRanking)
    .map(([itemId, qty]) => ({ itemId, qty, item: items.find(i => i.id === itemId) }))
    .filter(x => x.item)
    .sort((a, b) => b.qty - a.qty)
    .slice(0, 5)
  
  const rankingEl = document.getElementById('stat-ranking')
  const rankingEmpty = document.getElementById('stat-ranking-empty')
  if (topItems.length > 0) {
    rankingEl.style.display = 'flex'
    rankingEmpty.style.display = 'none'
    rankingEl.innerHTML = topItems.map((x, i) => `
      <div class="ranking-item">
        <span class="ranking-num">${i + 1}</span>
        <span class="ranking-name">${x.item.name}</span>
        <span class="ranking-qty">${x.qty} ${x.item.unit}</span>
      </div>
    `).join('')
  } else {
    rankingEl.style.display = 'none'
    rankingEmpty.style.display = 'block'
  }
  
  // 分类占比
  const catMap = {}
  cats.forEach(c => { catMap[c.id] = c.name })
  const catQty = {}
  items.forEach(item => {
    if (item.categoryId) {
      catQty[item.categoryId] = (catQty[item.categoryId] || 0) + item.quantity
    }
  })
  const catBreakdownEl = document.getElementById('stat-cat-breakdown')
  const catEmpty = document.getElementById('stat-cat-empty')
  const catEntries = Object.entries(catQty)
  if (catEntries.length > 0) {
    catBreakdownEl.style.display = 'flex'
    catEmpty.style.display = 'none'
    catBreakdownEl.innerHTML = catEntries.map(([catId, qty]) => `
      <div class="breakdown-item">
        <div class="breakdown-name">${catMap[catId] || '未分类'}</div>
        <div class="breakdown-bar">
          <div class="breakdown-fill" style="width:${Math.round((qty / items.length) * 100)}%"></div>
        </div>
        <div class="breakdown-qty">${qty} 件</div>
      </div>
    `).join('')
  } else {
    catBreakdownEl.style.display = 'none'
    catEmpty.style.display = 'block'
  }
}

// ============================
// 访问计数器
// ============================
(function() {
  // 记录访问
  const visitKey = 'warehouse_visits';
  const visits = JSON.parse(localStorage.getItem(visitKey) || '[]');
  const now = new Date().toISOString();
  visits.push({
    timestamp: now,
    userAgent: navigator.userAgent,
    referrer: document.referrer || 'direct'
  });
  // 只保留最近 1000 条记录
  if (visits.length > 1000) visits.shift();
  localStorage.setItem(visitKey, JSON.stringify(visits));
  
  // 在控制台显示访问统计
  console.log(`%c仓库数字员工 - 访问统计`, 'color: #4A90E2; font-size: 14px; font-weight: bold;');
  console.log(`总访问次数: ${visits.length}`);
  console.log(`最后访问: ${now}`);
  console.log(`来源: ${document.referrer || 'direct'}`);
})();
