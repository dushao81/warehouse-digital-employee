<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>访问数据查看 - 仓库数字员工</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #333; margin-bottom: 20px; }
    .stats { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
      gap: 20px; 
      margin-bottom: 30px;
    }
    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .stat-card h3 { color: #666; font-size: 14px; margin-bottom: 10px; }
    .stat-card .value { font-size: 32px; font-weight: bold; color: #4A90E2; }
    .table-container {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      background: #f5f7fa;
      padding: 12px;
      text-align: left;
      font-weight: 600;
      color: #333;
      border-bottom: 1px solid #e8e8e8;
    }
    td {
      padding: 12px;
      border-bottom: 1px solid #e8e8e8;
    }
    tr:hover { background: #f9f9f9; }
    .source-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
    }
    .source-xiaohongshu { background: #ffe5e5; color: #ff6b6b; }
    .source-oschina { background: #e5f5e5; color: #52c41a; }
    .source-zhihu { background: #e5f0ff; color: #1890ff; }
    .source-direct { background: #f5f5f5; color: #666; }
    .source-other { background: #fff5e5; color: #fa8c16; }
    .empty { text-align: center; padding: 40px; color: #999; }
    .refresh-btn {
      background: #4A90E2;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .refresh-btn:hover { background: #357abd; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 仓库数字员工 - 访问数据</h1>
    
    <button class="refresh-btn" onclick="location.reload()">🔄 刷新数据</button>
    
    <div class="stats" id="stats"></div>
    
    <div class="table-container">
      <table id="table">
        <thead>
          <tr>
            <th>访问时间</th>
            <th>来源</th>
            <th>浏览器</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script>
    // 从 warehouse-standalone.html 的 localStorage 读取数据
    const visits = JSON.parse(localStorage.getItem('warehouse_visits') || '[]');
    
    // 统计数据
    const stats = {
      total: visits.length,
      today: visits.filter(v => {
        const date = new Date(v.timestamp).toDateString();
        return date === new Date().toDateString();
      }).length,
      sources: {}
    };
    
    visits.forEach(v => {
      const source = v.referrer || 'direct';
      stats.sources[source] = (stats.sources[source] || 0) + 1;
    });
    
    // 显示统计
    const statsHtml = `
      <div class="stat-card">
        <h3>总访问次数</h3>
        <div class="value">${stats.total}</div>
      </div>
      <div class="stat-card">
        <h3>今日访问</h3>
        <div class="value">${stats.today}</div>
      </div>
      <div class="stat-card">
        <h3>访问来源</h3>
        <div class="value">${Object.keys(stats.sources).length}</div>
      </div>
    `;
    document.getElementById('stats').innerHTML = statsHtml;
    
    // 显示访问记录
    if (visits.length === 0) {
      document.getElementById('tbody').innerHTML = '<tr><td colspan="3" class="empty">暂无访问记录</td></tr>';
    } else {
      const rows = visits.map(v => {
        const date = new Date(v.timestamp).toLocaleString('zh-CN');
        const source = v.referrer || 'direct';
        let sourceClass = 'source-direct';
        if (source.includes('xiaohongshu')) sourceClass = 'source-xiaohongshu';
        else if (source.includes('oschina')) sourceClass = 'source-oschina';
        else if (source.includes('zhihu')) sourceClass = 'source-zhihu';
        else if (source !== 'direct') sourceClass = 'source-other';
        
        const sourceName = source === 'direct' ? '直接访问' : source;
        const browser = v.userAgent.substring(0, 60) + '...';
        
        return `
          <tr>
            <td>${date}</td>
            <td><span class="source-badge ${sourceClass}">${sourceName}</span></td>
            <td>${browser}</td>
          </tr>
        `;
      }).reverse().join('');
      
      document.getElementById('tbody').innerHTML = rows;
    }
  </script>
</body>
</html>
